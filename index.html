<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词背诵助手</title>
    <link rel="manifest" href="/word/manifest.json">
    <link rel="stylesheet" href="/word/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="单词背诵">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto px-4 py-6">
        <!-- 顶部导航 -->
        <header class="mb-6 relative">
            <button id="back-btn" class="hidden absolute top-0 left-0 text-2xl text-blue-600">← 返回</button>
            <h1 id="page-title" class="text-2xl font-bold text-center text-blue-600">单词背诵助手</h1>
        </header>

        <!-- ==================== 首页 ==================== -->
        <div id="home-page" class="page">
            <!-- 计划进度区域（动态渲染） -->
            <div id="plan-progress-area"></div>

            <!-- 今日复习入口 -->
            <div class="bg-orange-50 rounded-lg p-4 border border-orange-200 mb-4">
                <button class="w-full flex items-center justify-between" onclick="startReview()">
                    <span class="text-lg font-medium text-orange-700">📋 今日复习</span>
                    <span id="review-badge" class="bg-orange-500 text-white px-3 py-1 rounded-full text-sm" style="display:none">0</span>
                </button>
            </div>

            <!-- 列表选择 -->
            <div class="mb-6">
                <label class="block text-lg font-medium mb-2">选择单词列表</label>
                <div class="flex gap-2">
                    <select id="list-select" class="flex-1 p-3 border border-gray-300 rounded-lg text-lg">
                        <option value="">暂无列表</option>
                    </select>
                    <button id="edit-list-btn" class="px-3 bg-yellow-500 text-white rounded-lg text-lg" title="修改列表名称">✏️</button>
                    <button id="delete-list-btn" class="px-3 bg-red-500 text-white rounded-lg text-lg" title="删除列表">🗑️</button>
                </div>
            </div>

            <button id="new-list-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg text-lg mb-6">
                ➕ 新建单词列表
            </button>

            <!-- 功能网格 -->
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-green-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-green-600 transition" onclick="goToPage('add-word')">
                    <span class="text-3xl mb-1">➕</span>
                    <span class="text-sm font-medium">添加单词</span>
                </button>
                <button class="bg-blue-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-blue-600 transition" onclick="startECTest()">
                    <span class="text-3xl mb-1">📜</span>
                    <span class="text-sm font-medium">英译汉</span>
                </button>
                <button class="bg-orange-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-orange-600 transition" onclick="startCETest()">
                    <span class="text-3xl mb-1">✍️</span>
                    <span class="text-sm font-medium">汉译英</span>
                </button>
                <button class="bg-red-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-red-600 transition" onclick="goToPage('mistakes')">
                    <span class="text-3xl mb-1">❌</span>
                    <span class="text-sm font-medium">错题库</span>
                </button>
                <button class="bg-purple-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-purple-600 transition" onclick="goToPage('voice-settings')">
                    <span class="text-3xl mb-1">🔊</span>
                    <span class="text-sm font-medium">语音设置</span>
                </button>
                <button class="bg-gray-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-gray-600 transition" onclick="goToPage('word-list')">
                    <span class="text-3xl mb-1">📋</span>
                    <span class="text-sm font-medium">管理单词</span>
                </button>
                <button class="bg-teal-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-teal-600 transition" onclick="goToPage('stats')">
                    <span class="text-3xl mb-1">📊</span>
                    <span class="text-sm font-medium">学习统计</span>
                </button>
                <button class="bg-indigo-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-indigo-600 transition" onclick="goToPage('roots')">
                    <span class="text-3xl mb-1">🌳</span>
                    <span class="text-sm font-medium">词根分组</span>
                </button>
                <button class="bg-pink-500 text-white p-5 rounded-xl flex flex-col items-center hover:bg-pink-600 transition" onclick="goToPage('plan')">
                    <span class="text-3xl mb-1">📅</span>
                    <span class="text-sm font-medium">学习计划</span>
                </button>
                <button class="bg-gray-600 text-white p-5 rounded-xl flex flex-col items-center hover:bg-gray-700 transition" onclick="exportData()">
                    <span class="text-3xl mb-1">💾</span>
                    <span class="text-sm font-medium">导出数据</span>
                </button>
            </div>

            <!-- 导入按钮组 -->
            <div class="grid grid-cols-3 gap-2 mt-4">
                <button class="bg-gray-500 text-white py-2 rounded-lg text-sm" onclick="showFileImport()">📁 文件导入</button>
                <button class="bg-gray-500 text-white py-2 rounded-lg text-sm" onclick="showPasteImport()">📋 粘贴导入</button>
                <button class="bg-gray-500 text-white py-2 rounded-lg text-sm" onclick="showBatchEdit()">✏️ 批量编辑</button>
            </div>
        </div>

        <!-- ==================== 添加单词页面 ==================== -->
        <div id="add-word-page" class="page hidden">
            <p id="add-word-count" class="text-center text-lg text-gray-600 mb-4"></p>
            <div class="space-y-4">
                <div>
                    <label class="block text-lg font-medium mb-2">英文单词</label>
                    <div class="flex gap-2">
                        <input type="text" id="english-input" class="flex-1 p-3 border border-gray-300 rounded-lg text-lg" placeholder="输入英文">
                        <button id="lookup-btn" class="px-3 bg-blue-500 text-white rounded-lg text-sm">🔍 查询</button>
                    </div>
                    <div id="lookup-result" class="mt-1 text-sm text-gray-500">
                        <span id="lookup-phonetic"></span>
                        <span id="lookup-example" class="italic"></span>
                    </div>
                </div>
                <div>
                    <label class="block text-lg font-medium mb-2">中文含义</label>
                    <input type="text" id="chinese-input" class="w-full p-3 border border-gray-300 rounded-lg text-lg" placeholder="输入中文">
                </div>
                <button id="add-word-btn" class="w-full bg-green-500 text-white py-3 rounded-lg text-lg mt-6">
                    添加单词
                </button>
            </div>
        </div>

        <!-- ==================== 单词列表管理页面 ==================== -->
        <div id="word-list-page" class="page hidden">
            <div class="mb-4">
                <input type="text" id="word-search" class="w-full p-3 border border-gray-300 rounded-lg text-lg" placeholder="🔍 搜索单词（英文/中文）...">
            </div>
            <p id="word-list-count" class="text-center text-lg text-gray-600 mb-4"></p>
            <div id="word-list-container" class="space-y-2"></div>
        </div>

        <!-- ==================== 英译汉测试页面 ==================== -->
        <div id="ec-page" class="page hidden">
            <p id="ec-progress" class="text-center text-lg text-blue-600 mb-6"></p>
            <div class="flex justify-center items-center mb-4">
                <span id="ec-word" class="text-3xl font-bold mr-3"></span>
                <button id="ec-play-btn" class="text-2xl text-blue-600">🔊</button>
            </div>
            <div id="ec-word-detail" class="text-center mb-6"></div>
            <div id="ec-options" class="space-y-3 mb-6"></div>
            <p id="ec-feedback" class="text-center text-2xl"></p>
        </div>

        <!-- ==================== 汉译英测试页面 ==================== -->
        <div id="ce-page" class="page hidden">
            <p id="ce-progress" class="text-center text-lg text-blue-600 mb-6"></p>
            <div class="flex justify-center items-center mb-4">
                <span id="ce-word" class="text-3xl font-bold mr-3"></span>
                <button id="ce-play-btn" class="text-2xl text-blue-600">🔊</button>
            </div>
            <div id="ce-word-detail" class="text-center mb-4"></div>
            <input type="text" id="ce-input" class="w-full p-3 border border-gray-300 rounded-lg text-lg text-center mb-4" placeholder="输入英文答案" autocomplete="off">
            <button id="ce-submit-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg text-lg mb-6">提交</button>
            <p id="ce-feedback" class="text-center text-2xl"></p>
        </div>

        <!-- ==================== 每日复习页面 ==================== -->
        <div id="review-page" class="page hidden">
            <p id="review-progress" class="text-center text-lg text-orange-600 mb-6"></p>
            <div class="flex justify-center items-center mb-4">
                <span id="review-question-word" class="text-3xl font-bold mr-3"></span>
                <button id="review-play-btn" class="text-2xl text-orange-600">🔊</button>
            </div>
            <p id="review-mode-label" class="text-center text-sm text-gray-500 mb-4"></p>
            <div id="review-word-detail" class="text-center mb-4"></div>
            
            <!-- 英译汉选项区 -->
            <div id="review-ec-area" class="hidden">
                <div id="review-ec-options" class="space-y-3 mb-6"></div>
            </div>
            <!-- 汉译英输入区 -->
            <div id="review-ce-area" class="hidden">
                <input type="text" id="review-ce-input" class="w-full p-3 border border-gray-300 rounded-lg text-lg text-center mb-4" placeholder="输入英文答案" autocomplete="off">
                <button id="review-ce-submit" class="w-full bg-orange-600 text-white py-3 rounded-lg text-lg mb-6">提交</button>
            </div>
            <p id="review-feedback" class="text-center text-xl"></p>
        </div>

        <!-- ==================== 错题库页面 ==================== -->
        <div id="mistakes-page" class="page hidden">
            <div class="flex border-b border-gray-300 mb-4">
                <button id="ec-mistakes-tab" class="flex-1 py-2 text-lg font-medium text-blue-600 border-b-2 border-blue-600">英译汉错题</button>
                <button id="ce-mistakes-tab" class="flex-1 py-2 text-lg font-medium text-gray-500">汉译英错题</button>
            </div>
            <div id="mistakes-list" class="space-y-2"></div>
        </div>

        <!-- ==================== 语音设置页面 ==================== -->
        <div id="voice-settings-page" class="page hidden">
            <div class="space-y-8">
                <div>
                    <label class="block text-lg font-medium mb-2">语速 (-50% ~ +100%)</label>
                    <input type="range" id="rate-slider" min="-50" max="100" value="0" class="w-full">
                    <p id="rate-value" class="text-center text-lg mt-2">0%</p>
                </div>
                <div>
                    <label class="block text-lg font-medium mb-2">音量 (-50% ~ +50%)</label>
                    <input type="range" id="volume-slider" min="-50" max="50" value="0" class="w-full">
                    <p id="volume-value" class="text-center text-lg mt-2">0%</p>
                </div>
                <div>
                    <label class="block text-lg font-medium mb-2">音调 (-20Hz ~ +20Hz)</label>
                    <input type="range" id="pitch-slider" min="-20" max="20" value="0" class="w-full">
                    <p id="pitch-value" class="text-center text-lg mt-2">0Hz</p>
                </div>
                <button id="save-voice-btn" class="w-full bg-purple-600 text-white py-3 rounded-lg text-lg">保存设置</button>
            </div>
        </div>

        <!-- ==================== 学习统计页面 ==================== -->
        <div id="stats-page" class="page hidden">
            <!-- 今日概览 -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white rounded-lg p-4 border text-center">
                    <p class="text-2xl font-bold text-blue-600" id="stats-today-new">0</p>
                    <p class="text-sm text-gray-500">今日新词</p>
                </div>
                <div class="bg-white rounded-lg p-4 border text-center">
                    <p class="text-2xl font-bold text-green-600" id="stats-today-review">0</p>
                    <p class="text-sm text-gray-500">今日复习</p>
                </div>
                <div class="bg-white rounded-lg p-4 border text-center">
                    <p class="text-2xl font-bold text-purple-600" id="stats-today-accuracy">0%</p>
                    <p class="text-sm text-gray-500">正确率</p>
                </div>
                <div class="bg-white rounded-lg p-4 border text-center">
                    <p class="text-2xl font-bold text-orange-600" id="stats-today-time">0:00</p>
                    <p class="text-sm text-gray-500">学习时长</p>
                </div>
            </div>

            <!-- 连续打卡 -->
            <div class="bg-white rounded-lg p-4 border mb-6 text-center">
                <p class="text-sm text-gray-500">连续打卡</p>
                <p class="text-3xl font-bold text-red-500"><span class="streak-fire">🔥</span> <span id="stats-streak">0</span> 天</p>
            </div>

            <!-- 折线图 -->
            <div class="bg-white rounded-lg p-4 border mb-6">
                <p class="font-medium mb-3">近7天趋势</p>
                <div class="chart-container" style="height:200px">
                    <canvas id="stats-chart"></canvas>
                </div>
            </div>

            <!-- 列表掌握度 -->
            <div class="bg-white rounded-lg p-4 border">
                <p class="font-medium mb-3">列表掌握度</p>
                <div id="stats-mastery-list"></div>
            </div>
        </div>

        <!-- ==================== 词根分组页面 ==================== -->
        <div id="roots-page" class="page hidden">
            <p class="text-center text-gray-600 mb-4">基于现有单词自动识别词根并分组</p>
            <div id="roots-container"></div>
        </div>

        <!-- ==================== 学习计划页面 ==================== -->
        <div id="plan-page" class="page hidden">
            <div id="plan-page-content"></div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl p-6 w-80 mx-4 max-h-[80vh] overflow-y-auto">
            <h3 id="modal-title" class="text-xl font-bold mb-4"></h3>
            <div id="modal-content" class="mb-6"></div>
            <div id="modal-buttons" class="flex justify-end space-x-3"></div>
        </div>
    </div>

    <!-- 主入口 -->
    <script type="module" src="/word/js/app.js"></script>
</body>
</html>
